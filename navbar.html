<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>British Psychology Campus - Login</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Navbar */
      .navbar {
        background-color: #07498b;
      }
      .navbar-brand {
        font-weight: bold;
        color: white;
      }
      .navbar-nav .nav-link {
        color: white;
        margin-right: 15px;
      }
      .navbar-nav .nav-link:hover {
        color: #d4af37;
      }
      .login-btn {
        background-color: #d4af37;
        color: black;
        border-radius: 6px;
        padding: 6px 15px;
      }
      .login-btn:hover {
        background-color: #c49b2c;
        color: black;
      }

      /* Modal */
      .modal-header {
        background-color: #07498b;
        color: white;
      }
      .modal-footer a {
        color: #07498b;
        text-decoration: none;
      }
      .modal-footer a:hover {
        text-decoration: underline;
      }
      .btn-primary {
        background-color: #d4af37;
        border-color: #d4af37;
        color: black;
      }
      .btn-primary:hover {
        background-color: #c49b2c;
        border-color: #c49b2c;
        color: black;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="assets/logo.jpeg"
            alt="Logo"
            width="40"
            height="40"
            class="rounded-circle border border-2 border-white me-2 logo-img"
          />
          British Psychology Campus
        </a>

        <button
          class="navbar-toggler bg-light"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          ☰
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="aboutus.html">About Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="courses.html">Courses</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a
                href="#"
                class="login-btn text-decoration-none d-inline-block"
                data-bs-toggle="modal"
                data-bs-target="#loginModal"
              >
                Login
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Login Modal -->
    <div
      class="modal fade"
      id="loginModal"
      tabindex="-1"
      aria-labelledby="loginModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="loginModalLabel">Login</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="Enter email"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Password"
                  required
                />
              </div>
              <div class="mb-3 form-check">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="rememberMe"
                />
                <label class="form-check-label" for="rememberMe"
                  >Remember me</label
                >
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
          </div>
          <div class="modal-footer">
            <small class="text-muted">
              Don't have an account? <a href="register.html">Sign up</a>
            </small>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
