<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | British Psychology Campus</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        padding-top: 70px;
        background: #f5f7fa;
      }

      /* HERO */
      .contact-hero {
        background: url("https://images.pexels.com/photos/3184465/pexels-photo-3184465.jpeg")
          center/cover;
        height: 50vh;
        position: relative;
        color: white;
        display: flex;
        align-items: center;
        text-align: center;
      }

      .contact-hero::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 31, 63, 0.75);
      }

      .contact-hero .container {
        position: relative;
        z-index: 1;
      }

      .section-title {
        text-align: center;
        font-weight: bold;
        margin-bottom: 40px;
        color: #001f3f;
      }

      .section-title::after {
        content: "";
        width: 60px;
        height: 3px;
        background: #d4af37;
        display: block;
        margin: 10px auto;
      }

      .contact-card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }

      .contact-card:hover {
        transform: translateY(-8px);
      }

      .btn-warning:hover {
        background: #c19b2e;
      }

      .form-control:focus {
        border-color: #001f3f;
        box-shadow: none;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR LOAD -->
    <div id="navbar"></div>

    <!-- HERO -->
    <section class="contact-hero">
      <div class="container">
        <h1 class="fw-bold">Contact Us</h1>
        <p class="lead">We’d love to hear from you</p>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="py-5">
      <div class="container">
        <h2 class="section-title">Get In Touch</h2>

        <div class="row g-4">
          <!-- FORM -->
          <div class="col-md-6">
            <div class="contact-card">
              <form>
                <input
                  type="text"
                  class="form-control mb-3"
                  placeholder="Your Name"
                  required
                />
                <input
                  type="email"
                  class="form-control mb-3"
                  placeholder="Email"
                  required
                />
                <textarea
                  class="form-control mb-3"
                  rows="5"
                  placeholder="Message"
                  required
                ></textarea>
                <button class="btn btn-warning w-100">Send Message</button>
              </form>
            </div>
          </div>

          <!-- DETAILS -->
          <div class="col-md-6">
            <div class="contact-card">
              <h4 class="fw-bold mb-4">Contact Details</h4>

              <p>
                <i class="bi bi-geo-alt-fill text-primary me-2"></i> Colombo 12,
                Sri Lanka
              </p>
              <p>
                <i class="bi bi-telephone-fill text-primary me-2"></i> +94 77
                0244921
              </p>

              <hr />

              <h5 class="fw-bold">Office Hours</h5>
              <p class="mb-1">Mon - Fri: 9:00 AM - 5:00 PM</p>
              <p>Saturday: 9:00 AM - 1:00 PM</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER LOAD -->
    <div id="footer"></div>

    <!-- JS -->
    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
